<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - La Lengua</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Test Login - La Lengua</h2>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="adminprueba@gmail.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" value="Admin123" required>
        </div>
        
        <button type="submit">Iniciar Sesión</button>
    </form>
    
    <div id="result"></div>

    <script>
        const API_BASE_URL = 'https://lalenguacolombia.co/api/index.php';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            try {
                console.log('Enviando login request...');
                
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✅ Login Exitoso!</h3>
                            <p><strong>Usuario:</strong> ${data.user.username}</p>
                            <p><strong>Email:</strong> ${data.user.email}</p>
                            <p><strong>Rol:</strong> ${data.user.role}</p>
                            <p><strong>Token:</strong> ${data.token.substring(0, 50)}...</p>
                        </div>
                    `;
                    
                    // Probar endpoint de perfil
                    console.log('Probando endpoint de perfil...');
                    
                    const profileResponse = await fetch(`${API_BASE_URL}/auth/profile`, {
                        headers: {
                            'Authorization': `Bearer ${data.token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const profileData = await profileResponse.json();
                    console.log('Profile data:', profileData);
                    
                    if (profileData.success) {
                        resultDiv.innerHTML += `
                            <div class="result success" style="margin-top: 10px;">
                                <h3>✅ Perfil Obtenido!</h3>
                                <p><strong>Nombre:</strong> ${profileData.user.first_name} ${profileData.user.last_name}</p>
                                <p><strong>Teléfono:</strong> ${profileData.user.phone || 'No especificado'}</p>
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML += `
                            <div class="result error" style="margin-top: 10px;">
                                <h3>❌ Error en Perfil</h3>
                                <p>${profileData.message}</p>
                            </div>
                        `;
                    }
                    
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>❌ Error de Login</h3>
                            <p>${data.message}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Error de Conexión</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
